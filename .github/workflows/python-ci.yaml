name: Python Project CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cosmic-ray 
        pip install coverage

    - name: Run all tests with coverage
      run: |
        # Rulam toate suitele de teste colectate anterior
        coverage run --branch -m unittest discover -p "test_*.py"
        coverage report -m
        # Verificam pragul de coverage (ex: 80%)
        coverage report --fail-under=80

    - name: Generate HTML Coverage Report
      if: always()
      run: coverage html

    - name: Upload Coverage Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/
    - name: Mutation Testing
      continue-on-error: true
      run: |
            cosmic-ray init search_config.toml search_db.sqlite
            cosmic-ray exec search_config.toml search_db.sqlite
            cr-report search_db.sqlite > mutation_results.html


    - name: Upload Mutation Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mutation-testing-results
        path: mutation_results.html

    # - name: Slack or Email Notification on Failure
    #   if: failure()
